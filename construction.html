<!DOCTYPE html>
<html lang="nl" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binnenkort — MyTrailWalks</title>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/MyTrailWalks/assets/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/MyTrailWalks/assets/images/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/MyTrailWalks/assets/images/favicon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/MyTrailWalks/assets/images/favicon-192x192.png">
  <!-- CSS -->
  <link rel="stylesheet" href="/MyTrailWalks/css/main.css">
  <link rel="stylesheet" href="/MyTrailWalks/css/topbar.css">
  <link rel="stylesheet" href="/MyTrailWalks/css/footer.css">
  <!-- pagina style -->
  <style>
    .construction {
      min-height: calc(100vh - 56px - 80px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2xl) var(--space-lg);
    }
    .construction__inner {
      text-align: center;
      max-width: 480px;
    }
    .construction__icon {
      font-size: 3rem;
      margin-bottom: var(--space-lg);
      display: block;
    }
    .construction__title {
      font-family: var(--font-display);
      font-size: var(--text-2xl);
      font-weight: var(--weight-semibold);
      color: var(--color-forest-dark);
      margin: 0 0 var(--space-md);
    }
    .construction__text {
      font-size: var(--text-base);
      color: var(--color-charcoal-soft);
      line-height: 1.7;
      margin: 0 0 var(--space-xl);
    }
    .construction__back {
      display: inline-block;
      padding: var(--space-sm) var(--space-xl);
      background: var(--color-forest);
      color: var(--color-cream);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      text-decoration: none;
      transition: background 0.2s ease;
    }
    .construction__back:hover {
      background: var(--color-forest-dark);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <!-- Eruda debugger — niet verwijderen -->
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <!-- topbar -->
  <div id="topbar-placeholder" class="topbar-placeholder" aria-hidden="true"></div>
  <!-- main content -->
  <main id="main-content">
    <div class="construction">
      <div class="construction__inner">
        <span class="construction__icon">🏗</span>
        <h1 class="construction__title" data-i18n="common:construction.title">Binnenkort beschikbaar</h1>
        <p class="construction__text" data-i18n="common:construction.text">
          Deze pagina is momenteel in ontwikkeling. Kom later terug voor meer.
        </p>
        <a href="/MyTrailWalks/" class="construction__back" data-i18n="common:construction.back">← Terug naar home</a>
      </div>
    </div>
  </main>
  <!-- footer -->
  <div id="footer-placeholder" class="footer-placeholder" aria-hidden="true"></div>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <!-- i18next CDN -->
  <script src="https://cdn.jsdelivr.net/npm/i18next@23/i18next.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7/i18nextBrowserLanguageDetector.min.js"></script>
  <!-- Scripts -->
  <script src="/MyTrailWalks/js/i18n.js"></script>
  <script src="/MyTrailWalks/js/auth.js?v=1.1.0"></script>
  <script src="/MyTrailWalks/js/topbar-auth.js?v=1.3.0"></script>
  <script src="/MyTrailWalks/js/analytics.js?v=1.1.0"></script>
  <script src="/MyTrailWalks/js/app.js?v=3.2.0"></script>
</body>
</html>
